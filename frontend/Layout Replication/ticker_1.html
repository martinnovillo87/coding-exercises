<!DOCTYPE html>
<html lang="es">

<title>Tabla Grid</title>

<div class="container">

    <div class="left-column">
        <span class="header">Novonesis (Novozymes) B (COP)</span>

    <div class="vertical-divider"></div>

    <div class="grid-table">

        <div class="result">398.00</div>

        <div class="variable">High</div>

        <div class="result">489.40</div>
  
        <div class="variable">Low</div>
        <div class="result">396.80</div>
        <div class="result">52-wk low</div>
        <div class="result">368.50</div>
   
        <div class="variable">Prev Close</div>
        <div class="result">400.30</div>
        <div class="result">Market Cap</div>
        <div class="result">166,112 M</div>
   

    </div>

        Data is real-time<br>
